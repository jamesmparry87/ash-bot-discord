# Nixpacks configuration for Railway deployment
# Nixpacks will auto-detect Python version from runtime.txt and include pip automatically

[phases.install]
# Install Python dependencies (pip is automatically available)
cmds = ["pip install -r requirements.txt"]

[start]
# Start command for the Discord bot
cmd = "python bot_modular.py"

# Note: Environment variables (DISCORD_TOKEN, API keys, etc.) 
# are injected by Railway at runtime only, not during build.
# The ARG/ENV warnings in build logs are informational only - 
# secrets are never baked into build layers.
